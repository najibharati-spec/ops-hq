<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OPS HQ — Espace Agent</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
</head>
<body>
<div class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-text">OPS HQ</span>
      <span class="logo-sub">Espace Agent</span>
    </div>
    <span class="nav-section">Mon espace</span>
    <a href="agent.html"          class="nav-item active"><i class="ti ti-home"></i> Accueil</a>
    <a href="agent-missions.html" class="nav-item"><i class="ti ti-calendar"></i> Mes missions</a>
    <a href="agent-rapports.html" class="nav-item"><i class="ti ti-file-text"></i> Mes rapports</a>
    <div class="sidebar-user">
      <div class="u-name" id="agentName">—</div>
      <div class="u-role">On-Field Agent</div>
      <span class="badge badge-green">AGENT</span>
      <br/><br/>
      <span class="btn btn-sm" id="logoutBtn" style="cursor:pointer;">
        <i class="ti ti-logout"></i> Déconnexion
      </span>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div>
        <div class="page-title">Bonjour, <span id="greetName">—</span></div>
        <div class="page-sub" id="dateDisplay"></div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="openRapportModal()">
          <i class="ti ti-plus"></i> Soumettre un rapport
        </button>
      </div>
    </div>

    <div id="alertBox" class="alert"></div>

    <!-- Stats agent -->
    <div class="stat-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px;">
      <div class="stat-card">
        <div class="stat-label">Mes missions</div>
        <div class="stat-val" style="color:var(--accent-2);" id="statMissions">—</div>
        <div class="stat-sub">Ce mois</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Rapports soumis</div>
        <div class="stat-val" style="color:var(--green);" id="statRapports">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Abonnement</div>
        <div class="stat-val" style="color:var(--purple);" id="statAbo">—</div>
        <div class="stat-sub" id="statAboSub"></div>
      </div>
    </div>

    <!-- Prochaines missions -->
    <div class="card">
      <div class="card-title">
        <span><i class="ti ti-calendar-event" style="margin-right:6px;"></i>Prochaines missions</span>
      </div>
      <div id="missionsList">
        <div class="empty"><i class="ti ti-loader"></i><p>Chargement...</p></div>
      </div>
    </div>

    <!-- Mes rapports récents -->
    <div class="card">
      <div class="card-title">
        <span><i class="ti ti-file-text" style="margin-right:6px;"></i>Mes derniers rapports</span>
      </div>
      <div id="rapportsList">
        <div class="empty"><i class="ti ti-loader"></i><p>Chargement...</p></div>
      </div>
    </div>
  </main>
</div>

<!-- Modal soumettre rapport -->
<div class="modal-overlay" id="modalRapport">
  <div class="modal">
    <div class="modal-title"><i class="ti ti-file-plus"></i> Soumettre un rapport</div>
    <i class="ti ti-x modal-close" onclick="closeRapportModal()"></i>

    <div class="field">
      <label>Titre du rapport</label>
      <input type="text" id="rTitre" placeholder="Ex: Rapport de patrouille — 08/06/2026" />
    </div>
    <div class="field">
      <label>Contenu</label>
      <textarea id="rContenu" style="min-height:140px;" placeholder="Décrivez la mission, les incidents, les observations..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeRapportModal()">Annuler</button>
      <button class="btn btn-primary" onclick="submitRapport()">
        <i class="ti ti-send"></i> Envoyer
      </button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, getDocs, addDoc, doc, getDoc, query, where, orderBy, limit, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { firebaseConfig } from "../js/firebase-config.js";

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  let currentUser   = null;
  let agentFullName = "";

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "../index.html"; return; }
    const snap = await getDoc(doc(db, "users", user.uid));
    if (!snap.exists()) { window.location.href = "../index.html"; return; }
    const data = snap.data();
    if (data.role !== "agent") { window.location.href = "dashboard.html"; return; }

    currentUser   = user;
    agentFullName = data.displayName || data.name || user.email;

    document.getElementById("agentName").textContent  = agentFullName;
    document.getElementById("greetName").textContent  = agentFullName.split(" ")[0];

    const now = new Date();
    document.getElementById("dateDisplay").textContent =
      now.toLocaleDateString("fr-FR", { weekday:"long", year:"numeric", month:"long", day:"numeric" });

    loadMissions();
    loadRapports();
    loadAbonnement();
  });

  async function loadMissions() {
    try {
      const q    = query(
        collection(db, "missions"),
        where("agent", "==", agentFullName),
        orderBy("date", "asc"),
        limit(5)
      );
      const snap = await getDocs(q);
      document.getElementById("statMissions").textContent = snap.size;
      const container = document.getElementById("missionsList");

      if (snap.empty) {
        container.innerHTML = `<div class="empty"><i class="ti ti-calendar-off"></i><p>Aucune mission planifiée.</p></div>`;
        return;
      }
      container.innerHTML = "";
      snap.forEach(d => {
        const m   = d.data();
        const div = document.createElement("div");
        div.style.cssText = "padding:12px 0;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;";
        const statusColor = m.statut === "terminé" ? "badge-green" : m.statut === "en cours" ? "badge-amber" : "badge-blue";
        div.innerHTML = `
          <div>
            <div style="font-size:13px;color:var(--text-1);font-weight:500;">${m.titre}</div>
            <div style="font-size:11px;color:var(--text-4);margin-top:2px;">
              ${m.date || "—"} ${m.heureDebut ? "· " + m.heureDebut : ""} ${m.heureFin ? "→ " + m.heureFin : ""}
            </div>
            ${m.notes ? `<div style="font-size:11px;color:var(--text-3);margin-top:2px;">${m.notes}</div>` : ""}
          </div>
          <span class="badge ${statusColor}">${m.statut}</span>`;
        container.appendChild(div);
      });
    } catch(e) { console.error(e); }
  }

  async function loadRapports() {
    try {
      const q    = query(
        collection(db, "rapports"),
        where("agentUid", "==", currentUser?.uid || ""),
        orderBy("createdAt","desc"),
        limit(5)
      );
      const snap = await getDocs(q);
      document.getElementById("statRapports").textContent = snap.size;
      const container = document.getElementById("rapportsList");

      if (snap.empty) {
        container.innerHTML = `<div class="empty"><i class="ti ti-file-off"></i><p>Aucun rapport soumis.</p></div>`;
        return;
      }
      container.innerHTML = "";
      snap.forEach(d => {
        const r   = d.data();
        const div = document.createElement("div");
        div.style.cssText = "padding:10px 0;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;";
        const dateStr = r.createdAt?.toDate
          ? r.createdAt.toDate().toLocaleDateString("fr-FR")
          : "—";
        div.innerHTML = `
          <div>
            <div style="font-size:13px;color:var(--text-1);font-weight:500;">${r.titre || "Rapport"}</div>
            <div style="font-size:11px;color:var(--text-4);margin-top:2px;">${dateStr}</div>
          </div>
          <span class="badge ${r.lu ? 'badge-green' : 'badge-blue'}">${r.lu ? 'Lu par admin' : 'En attente'}</span>`;
        container.appendChild(div);
      });
    } catch(e) { console.error(e); }
  }

  async function loadAbonnement() {
    try {
      const q    = query(collection(db, "abonnements"), where("agent","==", agentFullName));
      const snap = await getDocs(q);
      if (!snap.empty) {
        const a = snap.docs[0].data();
        document.getElementById("statAbo").textContent    = a.plan;
        document.getElementById("statAboSub").textContent = `Expire: ${a.expire || "—"}`;
      } else {
        document.getElementById("statAbo").textContent = "—";
      }
    } catch(e) { console.error(e); }
  }

  // Modal rapport
  window.openRapportModal  = () => document.getElementById("modalRapport").classList.add("open");
  window.closeRapportModal = () => document.getElementById("modalRapport").classList.remove("open");

  window.submitRapport = async function() {
    const titre   = document.getElementById("rTitre").value.trim();
    const contenu = document.getElementById("rContenu").value.trim();
    if (!titre || !contenu) {
      showAlert("Titre et contenu sont obligatoires.", "error");
      return;
    }
    await addDoc(collection(db, "rapports"), {
      titre,
      contenu,
      agentName: agentFullName,
      agentUid:  currentUser.uid,
      lu:        false,
      createdAt: serverTimestamp(),
    });
    showAlert("Rapport envoyé avec succès !", "success");
    closeRapportModal();
    document.getElementById("rTitre").value   = "";
    document.getElementById("rContenu").value = "";
    loadRapports();
  };

  function showAlert(msg, type) {
    const el = document.getElementById("alertBox");
    el.className = `alert alert-${type}`;
    el.textContent = msg;
    el.style.display = "block";
    setTimeout(() => el.style.display = "none", 4000);
  }

  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "../index.html";
  });
</script>
</body>
</html>
