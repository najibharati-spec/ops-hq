<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OPS HQ — Agents</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
</head>
<body>
<div class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-text">OPS HQ</span>
      <span class="logo-sub">Field Management System</span>
    </div>
    <span class="nav-section">Principal</span>
    <a href="dashboard.html" class="nav-item"><i class="ti ti-layout-dashboard"></i> Dashboard</a>
    <a href="planning.html"  class="nav-item"><i class="ti ti-calendar"></i> Planning</a>
    <a href="agents.html"    class="nav-item active"><i class="ti ti-users"></i> Agents</a>
    <span class="nav-section">Gestion</span>
    <a href="rapports.html"    class="nav-item"><i class="ti ti-file-text"></i> Rapports</a>
    <a href="abonnements.html" class="nav-item"><i class="ti ti-credit-card"></i> Abonnements</a>
    <div class="sidebar-user">
      <div class="u-name">Najib Harati</div>
      <div class="u-role">Lead On-Field Agent</div>
      <span class="badge badge-blue">ADMIN</span>
      <br/><br/>
      <span class="btn btn-sm" id="logoutBtn" style="cursor:pointer;">
        <i class="ti ti-logout"></i> Déconnexion
      </span>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div>
        <div class="page-title">Agents</div>
        <div class="page-sub">Équipe On-Field — 12 agents</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        <span><i class="ti ti-users" style="margin-right:6px;"></i>Liste des agents</span>
      </div>
      <table class="tbl">
        <thead>
          <tr>
            <th>Agent</th>
            <th>Missions</th>
            <th>Rapports</th>
            <th>Abonnement</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="agentsBody"></tbody>
      </table>
    </div>
  </main>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, getDocs, query, where, doc, getDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { firebaseConfig, AGENTS } from "../js/firebase-config.js";

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "../index.html"; return; }
    const snap = await getDoc(doc(db, "users", user.uid));
    if (!snap.exists() || snap.data().role !== "admin") {
      window.location.href = "../index.html";
    }
  });

  async function loadAgents() {
    const [missSnap, rapSnap, aboSnap] = await Promise.all([
      getDocs(collection(db, "missions")),
      getDocs(collection(db, "rapports")),
      getDocs(collection(db, "abonnements")),
    ]);

    const missions    = missSnap.docs.map(d => d.data());
    const rapports    = rapSnap.docs.map(d => d.data());
    const abonnements = aboSnap.docs.map(d => d.data());

    const tbody = document.getElementById("agentsBody");
    tbody.innerHTML = "";

    AGENTS.forEach(ag => {
      const mCount = missions.filter(m => m.agent === ag.name).length;
      const rCount = rapports.filter(r => r.agentName === ag.name).length;
      const abo    = abonnements.find(a => a.agent === ag.name);

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>
          <div class="agent-row">
            <div class="avatar">${ag.initials}</div>
            <span class="agent-name-txt">${ag.name}</span>
          </div>
        </td>
        <td style="color:var(--text-2);">${mCount}</td>
        <td style="color:var(--text-2);">${rCount}</td>
        <td>${abo
          ? `<span class="badge badge-green">${abo.plan}</span>`
          : `<span class="badge badge-red">Aucun</span>`
        }</td>
        <td style="display:flex;gap:6px;">
          <a href="rapports.html" class="btn btn-sm"><i class="ti ti-file-text"></i> Rapports</a>
          <a href="abonnements.html" class="btn btn-sm"><i class="ti ti-credit-card"></i> Abonnement</a>
        </td>`;
      tbody.appendChild(tr);
    });
  }

  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "../index.html";
  });

  loadAgents();
</script>
</body>
</html>
