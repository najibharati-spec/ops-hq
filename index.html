<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OPS HQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
/* =============================================
   OPS HQ — LUXURY GOLD/BLACK THEME (PREMIUM)
   ============================================= */
:root{
  --bg:#080a0f;
  --bg2:#0d1117;
  --bg3:#111620;
  --border:#1e2a3a;
  --t1:#f0e6c8;
  --t2:#d4c49a;
  --t3:#a89060;
  --t4:#6b5a3e;
  --acc:#c9a84c;
  --acc2:#e8c96a;
  --accbg:rgba(201,168,76,.1);
  --accbdr:rgba(201,168,76,.3);
  --tram:#c9a84c;
  --energy:#c9a84c;
  --energybg:rgba(201,168,76,.12);
  --energybdr:rgba(201,168,76,.35);
  --green:#4ade80;
  --gbg:rgba(74,222,128,.1);
  --gbdr:rgba(74,222,128,.25);
  --amber:#f59e0b;
  --abg:rgba(245,158,11,.1);
  --abdr:rgba(245,158,11,.3);
  --red:#f87171;
  --rbg:rgba(248,113,113,.1);
  --rbdr:rgba(248,113,113,.25);
  --purple:#a78bfa;
  --pbg:rgba(167,139,250,.1);
  --pbdr:rgba(167,139,250,.25);
  --slate:#94a3b8;
  --sbg:rgba(148,163,184,.1);
  --sbdr:rgba(148,163,184,.25);
  --shadow:0 4px 24px rgba(0,0,0,.6);
  --shadow-md:0 8px 40px rgba(0,0,0,.7);
  --r:10px;--rl:16px;
  --font-display:'Space Grotesk',sans-serif;--font-body:'Inter',-apple-system,sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;color:inherit;}

body{
  font-family:var(--font-body);
  background:#080a0f !important;
  color:#f0e6c8 !important;
  font-size:14px;
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(201,168,76,.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(201,168,76,.04) 0%, transparent 50%) !important;
}

.page{display:none;min-height:100vh}.page.active{display:flex}

/* === LOGIN PAGE === */
.login-page{
  align-items:center;justify-content:center;
  background:linear-gradient(135deg,#040608 0%,#0d1117 50%,#111620 100%) !important;
  position:relative;overflow:hidden
}
.login-page::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(circle at 25% 75%, rgba(201,168,76,.12) 0%, transparent 45%),
    radial-gradient(circle at 80% 20%, rgba(201,168,76,.08) 0%, transparent 50%) !important;
  pointer-events:none
}
.tracking-line{position:absolute;top:0;left:0;width:100%;height:3px;background:rgba(255,255,255,.12);overflow:hidden}
.tracking-line::after{
  content:'';position:absolute;top:0;left:-20%;width:20%;height:100%;
  background:linear-gradient(90deg,transparent,#c9a84c,#e8c96a,transparent) !important;
  animation:trackmove 3.2s linear infinite
}
@keyframes trackmove{from{left:-20%}to{left:100%}}

.login-card{
  background:linear-gradient(145deg,#0d1117,#111620) !important;
  border:1px solid rgba(201,168,76,.25) !important;
  box-shadow:0 32px 80px rgba(0,0,0,.8), 0 0 60px rgba(201,168,76,.06) !important;
  border-radius:20px !important;
  padding:40px 36px;width:100%;max-width:400px;position:relative;z-index:1
}
.logo-text{
  display:block;font-family:var(--font-display);font-size:28px;font-weight:700;
  color:#c9a84c !important;
  background:linear-gradient(135deg,#c9a84c,#e8c96a,#c9a84c);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:5px;text-align:center
}
.logo-sub{display:block;font-size:11px;color:#6b5a3e !important;letter-spacing:2px;text-align:center;margin-top:4px;margin-bottom:32px;text-transform:uppercase}
.field{margin-bottom:16px}.field label{display:block;font-size:11px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;font-weight:600}

.inp-wrap{position:relative;display:flex;align-items:center}
.inp-wrap i:first-child{position:absolute;left:12px;color:#6b5a3e !important;font-size:16px;pointer-events:none}
.inp-wrap input{
  width:100%;background:#111620 !important;border:1.5px solid #1e2a3a !important;border-radius:10px !important;padding:11px 40px 11px 38px;color:#f0e6c8 !important;font-size:14px;outline:none;transition:border-color .15s
}
.inp-wrap input:focus{
  border-color:#c9a84c !important;background:#0d1117 !important;box-shadow:0 0 0 3px rgba(201,168,76,.12) !important;
}
.eye{position:absolute;right:12px;color:var(--t4);font-size:16px;cursor:pointer}
.err{background:rgba(248,113,113,.1) !important;border-color:rgba(248,113,113,.3) !important;color:#f87171 !important;border-radius:var(--r);padding:10px 14px;font-size:13px;margin-bottom:14px;display:none}

.btn-login{
  width:100%;background:linear-gradient(135deg,#c9a84c,#e8c96a) !important;border:none !important;color:#080a0f !important;font-weight:800 !important;border-radius:10px !important;padding:13px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;transition:all .15s;letter-spacing:.3px;font-family:var(--font-display);box-shadow:0 4px 20px rgba(201,168,76,.35) !important;
}
.btn-login:hover{
  background:linear-gradient(135deg,#e8c96a,#f0d97a) !important;box-shadow:0 6px 28px rgba(201,168,76,.5) !important;
}
.login-foot{text-align:center;margin-top:24px;font-size:11px;color:#6b5a3e !important;}

/* Profile cards on login */
.profile-card{
  background:linear-gradient(145deg,#0d1117,#111620) !important;
  border:1.5px solid #1e2a3a !important;
  border-radius:14px !important;
  padding:14px 8px;text-align:center;cursor:pointer;transition:all .2s !important;
}
.profile-card:hover{
  border-color:#c9a84c !important;
  background:linear-gradient(145deg,#111620,#161d2a) !important;
  box-shadow:0 8px 30px rgba(201,168,76,.2), 0 0 0 1px rgba(201,168,76,.15) !important;
  transform:translateY(-3px) !important;
}

/* === SIDEBAR === */
.app-page{flex-direction:row}
.sidebar{
  width:230px;background:linear-gradient(180deg,#0a0d14,#0d1117) !important;border-right:1px solid #1e2a3a !important;display:flex;flex-direction:column;min-height:100vh;flex-shrink:0;position:sticky;top:0;height:100vh;box-shadow:4px 0 24px rgba(0,0,0,.5) !important;
}
.sb-logo{padding:22px 20px 18px;border-bottom:1px solid #1e2a3a;position:relative;overflow:hidden}
.sb-logo .logo-text{font-size:18px;letter-spacing:3px;text-align:left;margin-bottom:2px}
.sb-logo .logo-sub{text-align:left;margin-bottom:0;font-size:10px}
.sb-logo::after{content:'';position:absolute;bottom:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,#c9a84c,#e8c96a,#c9a84c) !important;}

.nav-sec{padding:18px 20px 5px;font-size:10px;color:#4a3d28 !important;letter-spacing:2px;text-transform:uppercase;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;color:#a89060 !important;cursor:pointer;border-left:2px solid transparent !important;text-decoration:none;transition:all .15s;font-weight:500}
.nav-item i{font-size:17px}
.nav-item:hover{color:#f0e6c8 !important;background:rgba(201,168,76,.06) !important;}
.nav-item.active{
  color:#c9a84c !important;
  background:linear-gradient(90deg,rgba(201,168,76,.12),rgba(201,168,76,.03)) !important;
  border-left:3px solid #c9a84c !important;
}
.sb-user{margin-top:auto;padding:16px 20px;border-top:1px solid #1e2a3a !important;}
.sb-user .uname{font-size:13px;color:#f0e6c8 !important;font-weight:600;font-family:var(--font-display)}
.sb-user .urole{font-size:11px;color:#6b5a3e !important;}

/* === BADGES === */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-top:6px}
.badge-blue{background:var(--accbg);color:var(--acc2)}.badge-green{background:var(--gbg);color:var(--green)}
.badge-amber{background:var(--abg);color:var(--amber)}.badge-red{background:var(--rbg);color:var(--red)}
.badge-purple{background:var(--pbg);color:var(--purple)}.badge-slate{background:var(--sbg);color:var(--slate)}

/* === MAIN AREA === */
.main{flex:1;padding:28px 32px;overflow-y:auto;max-height:100vh;background:transparent !important;}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px}
.ptitle{font-family:var(--font-display);font-size:26px !important;font-weight:800 !important;color:#f0e6c8 !important;letter-spacing:.3px}
.psub{color:#6b5a3e !important;font-size:12px;margin-top:3px}
.btns{display:flex;gap:10px;align-items:center}

/* === BUTTONS === */
.btn{
  display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:10px !important;font-size:13px;cursor:pointer;
  background:linear-gradient(145deg,#111620,#0d1117) !important;border:1px solid #2a3a4a !important;color:#d4c49a !important;
  text-decoration:none;transition:all .2s !important;font-weight:600 !important;box-shadow:var(--shadow)
}
.btn:hover{
  border-color:#c9a84c !important;color:#f0e6c8 !important;background:linear-gradient(145deg,#161d2a,#111620) !important;
}
.btn-primary{
  background:linear-gradient(135deg,#c9a84c,#e8c96a) !important;border:none !important;color:#080a0f !important;font-weight:800 !important;box-shadow:0 4px 16px rgba(201,168,76,.3) !important;
}
.btn-primary:hover{
  background:linear-gradient(135deg,#e8c96a,#f0d97a) !important;box-shadow:0 6px 24px rgba(201,168,76,.45) !important;
}
.btn-danger{background:rgba(248,113,113,.1) !important;border-color:rgba(248,113,113,.3) !important;color:#f87171 !important;}
.btn-danger:hover{background:rgba(248,113,113,.2) !important;}
.btn-success{background:rgba(74,222,128,.1) !important;border-color:rgba(74,222,128,.25) !important;color:#4ade80 !important;}
.btn-success:hover{background:rgba(74,222,128,.2) !important;}
.btn-sm{padding:5px 11px;font-size:12px}

/* READ-ONLY MODE */
body.readonly-mode .nav-item{pointer-events:auto}
body.readonly-mode .shift-cell{pointer-events:none;cursor:default;opacity:.85}
body.readonly-mode input, body.readonly-mode select, body.readonly-mode textarea{pointer-events:none;background:var(--bg3)!important;opacity:.7}
body.readonly-mode .btn:not(.ro-allow){pointer-events:none;opacity:.45;filter:grayscale(.3)}
body.readonly-mode .btn-sm{pointer-events:none;opacity:.45}
body.readonly-mode .readonly-banner{display:flex!important}

/* === CARDS & GRIDS === */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.card,.stat-card,.zone-card,.modal-box{
  background:linear-gradient(145deg,#0d1117,#111620) !important;border:1px solid #1e2a3a !important;border-radius:18px !important;padding:18px 20px;box-shadow:0 8px 32px rgba(0,0,0,.5) !important;position:relative;overflow:hidden
}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;width:4px !important;height:100%;
  background:linear-gradient(180deg,#c9a84c,#e8c96a) !important;
}
.slabel{color:#6b5a3e !important;font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;font-weight:600}
.sval{font-family:var(--font-display);font-size:30px;font-weight:700;color:#f0e6c8 !important;}
.ssub{color:#6b5a3e !important;font-size:11px;margin-top:5px}

.card-title{color:#a89060 !important;font-size:11px !important;font-weight:700 !important;letter-spacing:2px !important;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}

/* === TABLES === */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:10px 14px;font-size:10px !important;color:#6b5a3e !important;letter-spacing:1.5px !important;text-transform:uppercase;border-bottom:1px solid #1e2a3a !important;font-weight:700 !important;background:transparent !important;}
.tbl td{padding:13px 14px !important;font-size:14px;color:#d4c49a !important;border-bottom:1px solid #141b26 !important;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}.tbl tbody tr:hover td{background:rgba(201,168,76,.04) !important;}

.avatar{width:34px;height:34px;border-radius:50%;background:var(--accbg);border:1.5px solid var(--accbdr);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--acc);flex-shrink:0;font-family:var(--font-display)}
.ag-row{display:flex;align-items:center;gap:10px}

/* === MODAL === */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(4,6,9,.7);z-index:999;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-ov.open{display:flex}
.modal{background:linear-gradient(145deg,#0d1117,#111620) !important;border:1px solid #1e2a3a !important;border-radius:var(--rl);padding:28px 30px;width:100%;max-width:480px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.7)}
.modal-title{font-family:var(--font-display);font-size:16px;font-weight:700;color:#f0e6c8 !important;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.modal-x{position:absolute;top:16px;right:16px;color:var(--t4);cursor:pointer;font-size:20px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all .15s}
.modal-x:hover{color:#f0e6c8;background:var(--bg3)}

.mfield{margin-bottom:16px}\.mfield label{display:block;font-size:11px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;font-weight:600}
.mfield input,.mfield select,.mfield textarea{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);padding:9px 12px;color:#f0e6c8;font-size:13px;outline:none;font-family:inherit;transition:border-color .15s}
.mfield input:focus,.mfield select:focus,.mfield textarea:focus{border-color:var(--acc);background:#0d1117}
.mfield textarea{resize:vertical;min-height:90px}.mfield select option{background:#111620 !important;color:#f0e6c8 !important;}
.modal-acts{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.alert{padding:12px 16px;border-radius:var(--r);font-size:13px;margin-bottom:16px;display:none;font-weight:500}
.alert-success{background:var(--gbg);border:1px solid var(--gbdr);color:var(--green)}
.alert-error{background:var(--rbg);border:1px solid var(--rbdr);color:var(--red)}
.empty{text-align:center;padding:48px 20px;color:var(--t4)}
.empty i{font-size:40px;margin-bottom:12px;display:block}
.rpt-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--t4)}
.section{display:none}.section.active{display:block}

/* === PLANNING TABLE === */
.plan-wrap{overflow-x:auto;border-radius:var(--rl);border:1px solid #1e2a3a;box-shadow:var(--shadow)}
.plan-tbl{width:100%;border-collapse:collapse;background:transparent}
.plan-tbl th{
  padding:12px 10px;text-align:center;font-size:10px !important;color:#6b5a3e !important;letter-spacing:1.5px !important;text-transform:uppercase;border-bottom:1px solid #1e2a3a !important;background:transparent !important;min-width:110px;font-weight:700 !important;
}
.plan-tbl th:first-child{
  text-align:left;padding-left:18px;min-width:220px !important;position:sticky;left:0;background:#0a0d14 !important;z-index:10 !important;color:#f0e6c8 !important;border-right:1px solid #1e2a3a !important;
}
.plan-tbl th:last-child{min-width:130px}
.plan-tbl td{padding:8px 10px;border-bottom:1px solid #141b26 !important;text-align:center;vertical-align:middle;color:#d4c49a !important;}
.plan-tbl td:first-child{
  text-align:left;padding-left:18px;position:sticky;left:0;background:#0a0d14 !important;z-index:10 !important;color:#f0e6c8 !important;font-weight:700 !important;border-right:1px solid #1e2a3a !important;
}
.plan-tbl td:last-child{text-align:center}
.plan-tbl tbody tr:hover td{background:rgba(201,168,76,.03) !important;}
.plan-tbl tbody tr:hover td:first-child{background:#0a0d14 !important;}
.plan-tbl tbody tr:last-child td{border-bottom:none}

/* === SHIFT CELLS — LUXURY PRO === */
.shift-cell{
  display:inline-flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:12px !important;padding:8px 12px !important;min-width:100px !important;min-height:52px !important;
  cursor:pointer;transition:all .2s !important;gap:2px;position:relative !important;overflow:hidden !important;
}
.shift-cell::before{
  content:'';position:absolute;inset:0;border-radius:12px;opacity:.4;
  background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 60%);
  pointer-events:none;
}
.shift-cell:hover{
  transform:translateY(-2px) !important;filter:brightness(1.15) !important;box-shadow:0 8px 24px rgba(0,0,0,.5) !important;
}

/* SHIFT COLOR VARIABLES (Fixing visibility on Dark theme) */
.sh-work{
  background:linear-gradient(135deg,rgba(16,185,129,.18),rgba(16,185,129,.08)) !important;
  border:1.5px solid rgba(16,185,129,.4) !important;
  box-shadow:0 0 12px rgba(16,185,129,.1), inset 0 1px 0 rgba(255,255,255,.05) !important;
}
.sh-work .sh-t, .sh-work .sh-s{color:#34d399 !important;}

.sh-off{
  background:linear-gradient(135deg,rgba(30,42,60,.4),rgba(20,30,45,.4)) !important;
  border:1.5px solid rgba(100,120,150,.25) !important;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03) !important;
}
.sh-off .sh-t, .sh-off .sh-s{color:#64748b !important;}

.sh-absent{
  background:linear-gradient(135deg,rgba(239,68,68,.18),rgba(239,68,68,.08)) !important;
  border:1.5px solid rgba(239,68,68,.4) !important;
  box-shadow:0 0 12px rgba(239,68,68,.1), inset 0 1px 0 rgba(255,255,255,.05) !important;
}
.sh-absent .sh-t, .sh-absent .sh-s{color:#f87171 !important;}

.sh-conge{
  background:linear-gradient(135deg,rgba(245,158,11,.18),rgba(245,158,11,.08)) !important;
  border:1.5px solid rgba(245,158,11,.4) !important;
  box-shadow:0 0 12px rgba(245,158,11,.1), inset 0 1px 0 rgba(255,255,255,.05) !important;
}
.sh-conge .sh-t, .sh-conge .sh-s{color:#fbbf24 !important;}

.sh-maladie{
  background:linear-gradient(135deg,rgba(139,92,246,.18),rgba(139,92,246,.08)) !important;
  border:1.5px solid rgba(139,92,246,.4) !important;
  box-shadow:0 0 12px rgba(139,92,246,.1), inset 0 1px 0 rgba(255,255,255,.05) !important;
}
.sh-maladie .sh-t, .sh-maladie .sh-s{color:#a78bfa !important;}

.sh-double{
  background:linear-gradient(135deg,rgba(201,168,76,.25),rgba(201,168,76,.1)) !important;
  border:1.5px solid rgba(201,168,76,.5) !important;
  box-shadow:0 0 12px rgba(201,168,76,.15), inset 0 1px 0 rgba(255,255,255,.05) !important;
}
.sh-double .sh-t, .sh-double .sh-s{color:#e8c96a !important;}

.sh-empty{background:transparent;border:1.5px dashed #1e2a3a}
.sh-empty .sh-t{color:#6b5a3e;font-size:18px;font-weight:300}

.sh-t{font-size:12px;font-weight:700;font-family:var(--font-display)}
.sh-s{font-size:10px;opacity:.75;margin-top:1px;font-weight:500}

.total-h{background:rgba(16,185,129,.15);border:1.5px solid rgba(16,185,129,.3);border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;color:#34d399;display:inline-block;font-family:var(--font-display)}
.total-0{background:rgba(100,120,150,.1);border:1.5px solid rgba(100,120,150,.2);color:#64748b}

/* === COLOR MODAL & PRESETS === */
.color-modal{max-width:520px}
.color-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg3);border-radius:10px;border:1px solid var(--border);margin-bottom:10px}
.color-row-left{display:flex;align-items:center;gap:12px}
.color-preview{width:38px;height:38px;border-radius:8px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:all .2s}
.color-pickers{display:flex;align-items:center;gap:8px}
.color-pickers label{font-size:10px;color:var(--t4);text-transform:uppercase;letter-spacing:.8px;font-weight:600;white-space:nowrap}
.color-pickers input[type=color]{width:36px;height:32px;border:1.5px solid var(--border);border-radius:6px;cursor:pointer;padding:2px;background:var(--bg3)}
.palette-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.palette-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .12s,border-color .12s;flex-shrink:0}
.palette-dot:hover{transform:scale(1.2);border-color:var(--t2)}
.palette-dot.sel{border-color:var(--t1);transform:scale(1.15)}
.week-nav{display:flex;align-items:center;gap:8px}
.week-label{font-size:13px;font-weight:600;color:var(--t2);padding:0 4px;min-width:140px;text-align:center;font-family:var(--font-display)}
.presets{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.preset-btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid;transition:all .12s}
.preset-work{background:var(--gbg);border-color:var(--gbdr);color:var(--green)}
.preset-work:hover{background:rgba(74,222,128,.2)}
.plan-input-wrap{position:relative}
.plan-input{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);padding:9px 12px;color:var(--t1);font-size:13px;outline:none;font-family:monospace;transition:border-color .15s;letter-spacing:.5px}
.plan-input:focus{border-color:var(--acc);background:#fff}

.status-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.status-pill{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1.5px solid;cursor:pointer;transition:all .12s;opacity:.6}
.status-pill.sel{opacity:1;transform:scale(1.05)}
.sp-work{background:var(--gbg);border-color:var(--gbdr);color:var(--green)}
.sp-off{background:var(--sbg);border-color:var(--sbdr);color:var(--slate)}
.sp-absent{background:var(--rbg);border-color:var(--rbdr);color:var(--red)}
.sp-conge{background:var(--abg);border-color:var(--abdr);color:var(--amber)}
.sp-maladie{background:var(--pbg);border-color:var(--pbdr);color:var(--purple)}
.sp-double{background:var(--sh-double-bg);border-color:var(--sh-double-bdr);color:var(--sh-double-txt)}

.ag-status{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ag-started{background:var(--green)}
.ag-notstarted{background:var(--border)}

/* === ZONE BADGES === */
.zone-badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.5px;white-space:nowrap}
.z-hay{background:rgba(14,92,151,.15);color:#4ade80;border:1px solid #1e2a3a}
.z-agdal{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.3)}
.z-carr{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
.z-temara{background:rgba(139,92,246,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.3)}
.z-sale{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.4)}

.type-j{font-size:10px;font-weight:700;background:var(--energybg);border:1px solid var(--energybdr);color:#fbbf24;padding:2px 8px;border-radius:10px;white-space:nowrap}
.type-n{font-size:10px;font-weight:700;background:#0a0d14;border:1px solid var(--acc);color:#e8c96a;padding:2px 8px;border-radius:10px;white-space:nowrap}
.type-v{font-size:10px;font-weight:700;background:var(--pbg);border:1px solid var(--pbdr);color:var(--purple);padding:2px 8px;border-radius:10px;white-space:nowrap}

/* === DASHBOARD HERO STRIP === */
.hero-strip{
  display:flex;align-items:center;gap:28px;
  background:linear-gradient(135deg,#0d1117 0%,#1a1200 40%,#2a1e00 70%,#1a1200 100%) !important;
  border:1px solid rgba(201,168,76,.2) !important;
  border-radius:20px !important;padding:22px 28px;margin-bottom:20px;
  box-shadow:0 0 60px rgba(201,168,76,.08), 0 16px 40px rgba(0,0,0,.6) !important;
  color:#fff;flex-wrap:wrap;position:relative;overflow:hidden
}
.hero-strip::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(135deg,rgba(201,168,76,.05),transparent,rgba(201,168,76,.03));
}
.hero-live{display:flex;align-items:center;gap:14px}
.hero-livedot{width:14px;height:14px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(74,222,128,.5);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(74,222,128,.5)}70%{box-shadow:0 0 0 10px rgba(74,222,128,0)}100%{box-shadow:0 0 0 0 rgba(74,222,128,0)}}
.hero-num{font-family:var(--font-display);font-size:36px;font-weight:700;line-height:1}
.hero-label{font-size:11px;color:#d4c49a;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.hero-clock{padding-left:28px;border-left:1px solid #1e2a3a}
.hero-time{font-family:var(--font-display);font-size:30px;font-weight:700;letter-spacing:1px;color:#c9a84c}
.hero-stats{display:flex;gap:24px;margin-left:auto;flex-wrap:wrap}
.hero-stat{display:flex;flex-direction:column;align-items:center}
.hero-stat-num{font-family:var(--font-display);font-size:24px;font-weight:700;color:#c9a84c !important;}
.hero-stat-label{font-size:10px;color:#6b5a3e;text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* === ZONE GRID === */
.zone-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px}
.zone-card .zname{font-size:12px;font-weight:700;color:#f0e6c8 !important;margin-bottom:10px;letter-spacing:.3px}
.zone-card .zcount{display:flex;align-items:baseline;gap:6px}
.zone-card .zcount-num{font-family:var(--font-display);font-size:26px;font-weight:700;color:#4ade80 !important}
.zone-card .zcount-label{font-size:11px;color:#6b5a3e !important}
.zone-card .zoff{font-size:11px;color:#6b5a3e !important;margin-top:6px}
.z-hay-bar::before{background:#0E5C97}
.z-agdal-bar::before{background:#0F9D6E}
.z-carr-bar::before{background:#D9750A}
.z-temara-bar::before{background:#7C5CBF}
.z-sale-bar::before{background:#D64550}

/* === TIMELINE === */
.timeline-wrap{display:flex;flex-direction:column;gap:8px}
.timeline-row{display:grid;grid-template-columns:140px 1fr;align-items:center;gap:10px}
.timeline-name{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:#f0e6c8 !important}
.timeline-track{position:relative;height:22px;background:var(--bg3);border-radius:6px;overflow:hidden}
.timeline-bar{position:absolute;top:2px;bottom:2px;border-radius:4px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#080a0f;white-space:nowrap;overflow:hidden;padding:0 4px;background:linear-gradient(135deg,#c9a84c,#e8c96a)}
.timeline-now{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--energy);z-index:2}
.timeline-axis{display:grid;grid-template-columns:140px 1fr;gap:10px;margin-bottom:6px}
.timeline-axis-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--t4);padding:0 2px}
</style>
