<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OPS HQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
:root{
  --bg:#F4F6F8;--bg2:#fffdf9;--bg3:#EEF2F6;--border:#DCE3EA;
  --t1:#0E2A47;--t2:#33526E;--t3:#5E7A93;--t4:#9AAEC2;
  --acc:#0E5C97;--acc2:#1478C2;--accbg:#E6F1FB;--accbdr:#A8CFEC;
  --energy:#F59E0B;--energybg:#FEF3E2;--energybdr:#FBD49C;
  --green:#0F9D6E;--gbg:#E7F9F1;--gbdr:#9CE8CC;
  --red:#D64550;--rbg:#FDEEEF;--rbdr:#F3B7BC;
  --shadow:0 1px 3px rgba(14,42,71,.07),0 1px 2px rgba(14,42,71,.04);
  --r:8px;--rl:12px;
  --font-display:'Space Grotesk',sans-serif;--font-body:'Inter',-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--t1);font-size:14px}
.page{display:none;min-height:100vh}.page.active{display:flex}

/* LOGIN */
.login-page{align-items:center;justify-content:center;background:linear-gradient(135deg,#0E2A47 0%,#0E5C97 55%,#0EA5E9 100%);width:100%}
.login-card{background:#fff;border-radius:16px;padding:36px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(14,42,71,.35)}
.logo-text{font-family:var(--font-display);font-size:26px;font-weight:700;color:var(--acc);letter-spacing:4px;text-align:center;display:block}
.logo-sub{font-size:11px;color:var(--t4);letter-spacing:2px;text-align:center;margin-top:4px;margin-bottom:26px;text-transform:uppercase;display:block}
.profile-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.profile-btn{background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:12px 6px;text-align:center;cursor:pointer;transition:all .15s}
.profile-btn:hover{border-color:var(--acc);background:var(--accbg)}
.profile-avatar{width:36px;height:36px;border-radius:50%;background:var(--accbg);color:var(--acc);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:12px;margin:0 auto 6px}
.profile-name{font-size:10.5px;font-weight:600;color:var(--t2);line-height:1.2}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--t3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;font-weight:600}
.field input,.field select{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);padding:11px 12px;font-size:14px;outline:none}
.field input:focus{border-color:var(--acc);background:#fff}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 16px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--t2);transition:all .15s}
.btn:hover{background:var(--bg)}
.btn-primary{width:100%;background:var(--acc);border-color:var(--acc);color:#fff}
.btn-primary:hover{background:var(--acc2)}
.btn-link{background:none;border:none;color:var(--t4);font-size:12px;text-align:center;width:100%;margin-top:12px;cursor:pointer}
.err-msg{background:var(--rbg);border:1px solid var(--rbdr);color:var(--red);border-radius:var(--r);padding:9px 12px;font-size:12.5px;margin-bottom:12px;display:none}

/* APP SHELL */
.app-page{flex-direction:row;width:100%}
.sidebar{width:220px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:100vh;position:sticky;top:0;height:100vh;flex-shrink:0}
.sb-logo{padding:20px 18px;border-bottom:1px solid var(--border)}
.sb-logo .logo-text{font-size:16px;letter-spacing:2px;text-align:left}
.sb-logo .logo-sub{text-align:left;margin:2px 0 0;font-size:9px}
.nav-sec{padding:16px 18px 4px;font-size:9.5px;color:var(--t4);letter-spacing:1.5px;text-transform:uppercase;font-weight:700}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 18px;font-size:13px;color:var(--t3);cursor:pointer;border-left:2px solid transparent;font-weight:500}
.nav-item:hover{color:var(--t2);background:var(--bg)}
.nav-item.active{color:var(--acc);background:var(--accbg);border-left-color:var(--energy)}
.sb-user{margin-top:auto;padding:16px 18px;border-top:1px solid var(--border)}
.sb-user .uname{font-size:13px;font-weight:600;font-family:var(--font-display)}
.sb-user .urole{font-size:11px;color:var(--t4);margin-top:2px}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;margin-top:6px}
.badge-blue{background:var(--accbg);color:var(--acc2)}

.main{flex:1;padding:28px 32px;overflow-y:auto;max-height:100vh}
.topbar{margin-bottom:24px}
.ptitle{font-family:var(--font-display);font-size:22px;font-weight:700}
.psub{font-size:12px;color:var(--t4);margin-top:3px}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--shadow)}
.empty-card{text-align:center;padding:60px 24px;color:var(--t4)}
.empty-card i{font-size:40px;display:block;margin-bottom:12px;opacity:.5}
.empty-card .l1{font-size:14px;color:var(--t3)}
.empty-card .l2{font-size:12px;margin-top:4px}
.section{display:none}.section.active{display:block}

@media(max-width:800px){.sidebar{width:70px}.sidebar .nav-item span,.sb-logo .logo-sub,.sb-user{display:none}.nav-sec{display:none}}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div class="page login-page active" id="loginPage">
  <div class="login-card">
    <span class="logo-text">OPS HQ</span>
    <span class="logo-sub">Field Management System</span>

    <div id="profilePickerView">
      <div class="profile-grid" id="profileGrid"></div>
      <div class="btn" style="width:100%;justify-content:center" onclick="showAdminLogin()"><i class="ti ti-shield-lock"></i> Connexion Admin</div>
    </div>

    <div id="pinView" style="display:none">
      <div class="field">
        <label id="pinAgentName">Agent</label>
        <input type="password" id="pinInput" placeholder="Code PIN" maxlength="20" inputmode="numeric"/>
      </div>
      <div class="err-msg" id="pinError"></div>
      <div class="btn btn-primary" onclick="submitPin()">Déverrouiller</div>
      <div class="btn-link" onclick="backToProfiles()">← Retour</div>
    </div>

    <div id="adminView" style="display:none">
      <div class="field">
        <label>Identifiant</label>
        <input type="text" id="loginEmail" placeholder="votre.nom@opshq.ma" autocomplete="username"/>
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <div class="err-msg" id="loginError"></div>
      <div class="btn btn-primary" onclick="handleLogin()">Se connecter</div>
      <div class="btn-link" onclick="backToProfiles()">← Retour</div>
    </div>
  </div>
</div>

<!-- APP PAGE -->
<div class="page app-page" id="appPage">
  <aside class="sidebar">
    <div class="sb-logo">
      <span class="logo-text">OPS HQ</span>
      <span class="logo-sub">Field Management</span>
    </div>

    <div class="admin-only">
      <span class="nav-sec">Principal</span>
      <div class="nav-item active" onclick="go('dashboard',this)"><i class="ti ti-layout-dashboard"></i><span> Dashboard</span></div>
      <div class="nav-item" onclick="go('planning',this)"><i class="ti ti-calendar"></i><span> Planning</span></div>
      <div class="nav-item" onclick="go('agents',this)"><i class="ti ti-users"></i><span> Agents</span></div>
      <span class="nav-sec">Gestion</span>
      <div class="nav-item" onclick="go('rapports',this)"><i class="ti ti-file-text"></i><span> Rapports</span></div>
      <div class="nav-item" onclick="go('absences',this)"><i class="ti ti-calendar-x"></i><span> Absences</span></div>
      <div class="nav-item" onclick="go('pointage',this)"><i class="ti ti-clipboard-list"></i><span> Pointage</span></div>
      <div class="nav-item" onclick="go('suggestions',this)"><i class="ti ti-message-2"></i><span> Suggestions</span></div>
    </div>

    <div class="agent-only" style="display:none">
      <span class="nav-sec">Principal</span>
      <div class="nav-item active" onclick="go('monplanning',this)"><i class="ti ti-calendar"></i><span> Mon Planning</span></div>
      <div class="nav-item" onclick="go('mesrapports',this)"><i class="ti ti-file-text"></i><span> Mes Rapports</span></div>
      <div class="nav-item" onclick="go('mespointage',this)"><i class="ti ti-clipboard-list"></i><span> Pointage</span></div>
      <div class="nav-item" onclick="go('messuggestions',this)"><i class="ti ti-message-2"></i><span> Suggestions</span></div>
    </div>

    <div class="sb-user">
      <div class="uname" id="sbUserName">—</div>
      <div class="urole" id="sbUserRole">—</div>
      <span class="badge badge-blue" id="sbUserBadge"></span>
      <br/><br/>
      <span class="btn" style="cursor:pointer;width:100%;justify-content:center" onclick="doLogout()"><i class="ti ti-logout"></i> Déconnexion</span>
    </div>
  </aside>

  <main class="main" id="mainContent">
    <!-- Chaque section est vide pour l'instant : on les reconstruit une par une -->
    <div class="section active" id="sec-dashboard" data-title="Dashboard"></div>
    <div class="section" id="sec-planning" data-title="Planning"></div>
    <div class="section" id="sec-agents" data-title="Agents"></div>
    <div class="section" id="sec-rapports" data-title="Rapports"></div>
    <div class="section" id="sec-absences" data-title="Absences"></div>
    <div class="section" id="sec-pointage" data-title="Pointage"></div>
    <div class="section" id="sec-suggestions" data-title="Suggestions"></div>
    <div class="section" id="sec-monplanning" data-title="Mon Planning"></div>
    <div class="section" id="sec-mesrapports" data-title="Mes Rapports"></div>
    <div class="section" id="sec-mespointage" data-title="Pointage"></div>
    <div class="section" id="sec-messuggestions" data-title="Suggestions"></div>
  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
// ============================================================
// Connexion Firebase — inchangée, aucune donnée touchée
// (SDK "compat" chargé en <script> classique : marche même en ouvrant
//  le fichier directement en double-clic, pas besoin de serveur)
// ============================================================
const FC={apiKey:"AIzaSyDWL5H3OcGVRUpdpKu1T-8_P-5ieCtALBQ",authDomain:"ops-hq-v2.firebaseapp.com",projectId:"ops-hq-v2",storageBucket:"ops-hq-v2.firebasestorage.app",messagingSenderId:"651634935763",appId:"1:651634935763:web:57299286c5d0464d3ad126"};
firebase.initializeApp(FC);
const auth=firebase.auth();
const db=firebase.firestore();

// ============================================================
// Roster — les 13 agents (données de base, pas une "fonctionnalité")
// ============================================================
const AGENTS=[
  {name:"Yahya Rhallah",    ini:"YR",  zone:"Temara - Oulad Mtaa", pin:"3456"},
  {name:"Aymane Chlifane",  ini:"AC",  zone:"Temara - Oulad Mtaa", pin:"2345"},
  {name:"Mehdi Ait Jebour", ini:"MAJ", zone:"Temara - Oulad Mtaa", pin:"2244"},
  {name:"Achraf Akhlij",    ini:"AA",  zone:"Hay Riad - Soussi",   pin:"4567"},
  {name:"Islam Elmardi",    ini:"IE",  zone:"Hay Riad - Soussi",   pin:"6789"},
  {name:"Oussama El Atrach",ini:"OE",  zone:"Hay Riad - Soussi",   pin:"5678"},
  {name:"Youssef Derkoui",  ini:"YD",  zone:"Agdal - Carrousel",   pin:"1234"},
  {name:"Mourad Cherradi",  ini:"MC",  zone:"Agdal - Carrousel",   pin:"8901"},
  {name:"Ayoub Abssi",      ini:"ABS", zone:"Agdal - Carrousel",   pin:"7890"},
  {name:"Ayoub Ben Malek",  ini:"ABM", zone:"Salé - Medina",       pin:"9012"},
  {name:"Hassan Azgoune",   ini:"HA",  zone:"Salé - Medina",       pin:"0123"},
  {name:"Charaf Loummihi",  ini:"CL",  zone:"Salé - Medina",       pin:"2468"},
  {name:"Zakariae Benali",  ini:"ZB",  zone:"Technopolis",         pin:"1357"},
];

let pinTarget=null, userRole=null, myAgent=null;

function initials(name){ return name.split(" ").map(w=>w[0]).join("").slice(0,3).toUpperCase(); }

function buildProfileGrid(){
  const grid=document.getElementById("profileGrid");
  grid.innerHTML="";
  AGENTS.forEach(ag=>{
    const btn=document.createElement("div");
    btn.className="profile-btn";
    btn.innerHTML=`<div class="profile-avatar">${ag.ini}</div><div class="profile-name">${ag.name}</div>`;
    btn.onclick=()=>openPinView(ag);
    grid.appendChild(btn);
  });
}
function openPinView(ag){
  pinTarget=ag;
  document.getElementById("profilePickerView").style.display="none";
  document.getElementById("pinView").style.display="block";
  document.getElementById("pinAgentName").textContent=ag.name;
  document.getElementById("pinInput").value="";
  document.getElementById("pinError").style.display="none";
  setTimeout(()=>document.getElementById("pinInput").focus(),100);
}
window.showAdminLogin=()=>{
  document.getElementById("profilePickerView").style.display="none";
  document.getElementById("adminView").style.display="block";
};
window.backToProfiles=()=>{
  document.getElementById("pinView").style.display="none";
  document.getElementById("adminView").style.display="none";
  document.getElementById("profilePickerView").style.display="block";
};
window.submitPin=()=>{
  const val=document.getElementById("pinInput").value.trim();
  const errEl=document.getElementById("pinError");
  if(val!==pinTarget.pin){
    errEl.textContent="Code PIN incorrect.";
    errEl.style.display="block";
    return;
  }
  myAgent=pinTarget;
  userRole="agent";
  enterApp();
};
window.handleLogin=async()=>{
  const email=document.getElementById("loginEmail").value.trim();
  const password=document.getElementById("loginPassword").value;
  const errEl=document.getElementById("loginError");
  errEl.style.display="none";
  try{
    const cred=await auth.signInWithEmailAndPassword(email,password);
    const snap=await db.collection("users").doc(cred.user.uid).get();
    if(!snap.exists||snap.data().role!=="admin")throw new Error("Compte non autorisé.");
    userRole="admin";
    enterApp();
  }catch(e){
    errEl.textContent="Erreur : "+(e.code||e.message||"inconnue");
    errEl.style.display="block";
  }
};
window.doLogout=async()=>{
  try{ await auth.signOut(); }catch(e){}
  userRole=null; myAgent=null;
  document.getElementById("appPage").classList.remove("active");
  document.getElementById("loginPage").classList.add("active");
  window.backToProfiles();
};

function enterApp(){
  document.getElementById("loginPage").classList.remove("active");
  document.getElementById("appPage").classList.add("active");
  document.querySelectorAll(".admin-only").forEach(el=>el.style.display=userRole==="admin"?"":"none");
  document.querySelectorAll(".agent-only").forEach(el=>el.style.display=userRole==="agent"?"":"none");
  if(userRole==="admin"){
    document.getElementById("sbUserName").textContent="Najib Harati";
    document.getElementById("sbUserRole").textContent="Lead On-Field Agent";
    document.getElementById("sbUserBadge").textContent="ADMIN";
    go("dashboard");
  }else{
    document.getElementById("sbUserName").textContent=myAgent.name;
    document.getElementById("sbUserRole").textContent=myAgent.zone;
    document.getElementById("sbUserBadge").textContent="AGENT";
    go("monplanning");
  }
}

// ============================================================
// Router — chaque section est vide, on la construira au fur et à mesure
// ============================================================
window.go=(id, el)=>{
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  const sec=document.getElementById("sec-"+id);
  if(sec)sec.classList.add("active");
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
  if(el)el.classList.add("active");
  renderEmptySection(id);
};

function renderEmptySection(id){
  const sec=document.getElementById("sec-"+id);
  if(!sec||sec.dataset.rendered)return;
  const title=sec.dataset.title||id;
  sec.innerHTML=`
    <div class="topbar">
      <div class="ptitle">${title}</div>
      <div class="psub">Page vide — on la construit ensemble, étape par étape.</div>
    </div>
    <div class="card empty-card">
      <i class="ti ti-file-off"></i>
      <div class="l1">Aucune interface pour le moment.</div>
      <div class="l2">Dis-moi ce que tu veux ici et on la construit.</div>
    </div>`;
  sec.dataset.rendered="1";
}

// Session Firebase existante → connexion auto (admin uniquement, les agents utilisent le PIN à chaque fois)
auth.onAuthStateChanged(async(user)=>{
  if(user && !userRole){
    try{
      const snap=await db.collection("users").doc(user.uid).get();
      if(snap.exists && snap.data().role==="admin"){
        userRole="admin";
        enterApp();
      }
    }catch(e){}
  }
});

buildProfileGrid();
</script>
</body>
</html>
