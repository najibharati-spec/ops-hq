<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPS HQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Firebase (compat SDK — single file, no build step) -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>

<style>
:root{
  --sand: #F3EDE1;
  --sand-deep: #E9E0CE;
  --sky: #3A6EA5;
  --sky-deep: #2C5480;
  --sky-ink: #1E3A5A;
  --mustard: #D9A441;
  --mustard-deep: #C08A2A;
  --ink: #26241D;
  --ink-soft: #6B6558;
  --paper: #FFFDF8;
  --line: #E2D9C7;
  --green: #4C8B5C;
  --red: #C4593A;
  --radius: 10px;
  --font-display: 'Manrope', sans-serif;
  --font-mono: 'DM Mono', monospace;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family: var(--font-display);
  background: var(--sand);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
button{font-family: inherit; cursor:pointer; border:none;}
input, select{font-family: inherit;}
::selection{background: var(--mustard); color: #fff;}

/* ============ LOGIN SCREEN ============ */
#loginScreen{
  min-height: 100vh;
  display:flex; align-items:center; justify-content:center;
  background:
    radial-gradient(circle at 15% 20%, rgba(58,110,165,0.10), transparent 45%),
    radial-gradient(circle at 85% 80%, rgba(217,164,65,0.14), transparent 45%),
    var(--sand);
  padding: 24px;
}
.login-card{
  width: 100%; max-width: 420px;
  background: var(--paper);
  border-radius: 20px;
  padding: 40px 36px 32px;
  box-shadow: 0 24px 60px -20px rgba(30,58,90,0.25), 0 2px 8px rgba(30,58,90,0.06);
  border: 1px solid var(--line);
}
.login-brand{
  display:flex; flex-direction:column; align-items:center; text-align:center;
  margin-bottom: 30px;
}
.login-mark{
  width: 52px; height: 52px; border-radius: 14px;
  background: linear-gradient(145deg, var(--sky), var(--sky-ink));
  display:flex; align-items:center; justify-content:center;
  margin-bottom: 16px;
  box-shadow: 0 8px 20px -6px rgba(30,58,90,0.5);
}
.login-mark svg{width:26px; height:26px;}
.login-brand h1{
  font-size: 22px; font-weight: 800; letter-spacing: -0.02em;
  color: var(--sky-ink);
}
.login-brand p{
  font-size: 13px; color: var(--ink-soft); margin-top: 4px;
  font-family: var(--font-mono);
}
.profile-grid{
  display:grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 20px;
}
.profile-btn{
  background: var(--sand);
  border: 1.5px solid transparent;
  border-radius: var(--radius);
  padding: 16px 10px;
  display:flex; flex-direction:column; align-items:center; gap: 8px;
  transition: all .15s ease;
}
.profile-btn:hover{ border-color: var(--sky); background: #fff; transform: translateY(-1px); }
.profile-btn.selected{ border-color: var(--sky); background: #fff; box-shadow: 0 0 0 3px rgba(58,110,165,0.12); }
.profile-avatar{
  width: 40px; height: 40px; border-radius: 50%;
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-weight:700; font-size: 14px;
}
.profile-btn span{font-size: 13px; font-weight: 600; color: var(--ink);}
.profile-btn small{font-size: 10px; color: var(--ink-soft); text-transform:uppercase; letter-spacing:.04em;}

.login-input{
  width:100%; padding: 13px 14px; border-radius: var(--radius);
  border: 1.5px solid var(--line); background: var(--sand);
  font-size: 14px; margin-bottom: 12px; color: var(--ink);
  transition: border-color .15s;
}
.login-input:focus{ outline:none; border-color: var(--sky); background:#fff; }
.login-submit{
  width:100%; padding: 14px; border-radius: var(--radius);
  background: var(--mustard); color: #fff; font-weight: 700; font-size: 14px;
  letter-spacing: .02em; transition: background .15s;
}
.login-submit:hover{ background: var(--mustard-deep); }
.login-submit:disabled{ background: var(--line); color: var(--ink-soft); cursor:not-allowed; }
.login-error{
  font-size: 12.5px; color: var(--red); text-align:center; margin-top: 10px; min-height: 16px;
}

/* ============ APP SHELL ============ */
#app{ display:none; min-height: 100vh; }
.shell{ display:flex; min-height: 100vh; }

.sidebar{
  width: 220px; flex-shrink:0;
  background: linear-gradient(180deg, var(--sky-ink), var(--sky-deep) 60%, var(--sky));
  color: #EAF1F9;
  display:flex; flex-direction:column;
  padding: 22px 14px;
}
.sidebar-brand{
  display:flex; align-items:center; gap: 10px;
  padding: 0 8px 22px; margin-bottom: 18px;
  border-bottom: 1px solid rgba(255,255,255,0.12);
}
.sidebar-brand .mark{
  width:32px; height:32px; border-radius:9px;
  background: var(--mustard);
  display:flex; align-items:center; justify-content:center;
  font-weight:800; color:#fff; font-size:14px;
}
.sidebar-brand h2{ font-size: 15.5px; font-weight: 800; letter-spacing: -0.01em; }
.nav-group{ margin-bottom: 18px; }
.nav-label{
  font-size: 10px; text-transform: uppercase; letter-spacing: .08em;
  color: rgba(234,241,249,0.45); padding: 0 10px; margin-bottom: 6px; font-weight:600;
}
.nav-item{
  display:flex; align-items:center; gap: 10px;
  width:100%; text-align:left; padding: 9px 10px; border-radius: 8px;
  color: rgba(234,241,249,0.78); background: transparent; font-size: 13.5px; font-weight: 600;
  transition: all .12s; margin-bottom: 2px;
}
.nav-item:hover{ background: rgba(255,255,255,0.08); color:#fff; }
.nav-item.active{ background: var(--mustard); color: #fff; }
.nav-item svg{ width:16px; height:16px; flex-shrink:0; }
.sidebar-footer{ margin-top:auto; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.12); }
.user-chip{ display:flex; align-items:center; gap:9px; padding: 8px 10px; }
.user-chip .dot{ width:8px; height:8px; border-radius:50%; background: var(--green); flex-shrink:0; }
.user-chip-text{ display:flex; flex-direction:column; }
.user-chip-text b{ font-size: 12.5px; }
.user-chip-text span{ font-size: 10.5px; color: rgba(234,241,249,0.55); }
.logout-btn{
  width:100%; margin-top:10px; padding: 8px; border-radius: 8px;
  background: rgba(255,255,255,0.08); color: rgba(234,241,249,0.85);
  font-size: 12.5px; font-weight:600;
}
.logout-btn:hover{ background: rgba(255,255,255,0.16); }

.main{ flex:1; overflow-x:hidden; }
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding: 18px 32px; border-bottom: 1px solid var(--line);
  background: var(--paper);
}
.topbar h1{ font-size: 19px; font-weight: 800; letter-spacing: -0.01em; }
.topbar-meta{ display:flex; align-items:center; gap: 14px; font-size: 12.5px; color: var(--ink-soft); font-family: var(--font-mono); }
.sync-pill{
  display:flex; align-items:center; gap:6px; padding: 5px 10px;
  background: rgba(76,139,92,0.12); color: var(--green); border-radius: 20px; font-weight:600; font-size: 11.5px;
}
.sync-pill .dot{ width:6px; height:6px; border-radius:50%; background: var(--green); }

.view{ padding: 28px 32px; }
.hidden{ display:none !important; }

/* Dashboard cards */
.stat-grid{ display:grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 24px; }
.stat-card{
  background: var(--paper); border: 1px solid var(--line); border-radius: 14px; padding: 18px;
}
.stat-card .label{ font-size: 11.5px; color: var(--ink-soft); text-transform:uppercase; letter-spacing:.04em; font-weight:600; margin-bottom: 8px;}
.stat-card .value{ font-size: 28px; font-weight: 800; color: var(--sky-ink); font-family: var(--font-mono); }
.stat-card .sub{ font-size: 12px; color: var(--ink-soft); margin-top: 4px; }

.zone-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(210px,1fr)); gap: 14px; }
.zone-card{
  background: var(--paper); border: 1px solid var(--line); border-radius: 14px; padding: 16px;
  border-left: 4px solid var(--mustard);
}
.zone-card h3{ font-size: 14px; font-weight:700; margin-bottom: 10px; }
.zone-card .count{ font-size: 24px; font-weight: 800; color: var(--sky-ink); font-family: var(--font-mono); }
.zone-card .count-label{ font-size: 11.5px; color: var(--ink-soft); }

.section-title{ font-size: 15px; font-weight: 800; margin: 26px 0 14px; }

.card{ background: var(--paper); border:1px solid var(--line); border-radius: 14px; }

table{ width:100%; border-collapse: collapse; }
th{ text-align:left; font-size: 11px; text-transform:uppercase; letter-spacing:.04em; color: var(--ink-soft); font-weight:700; padding: 12px 16px; border-bottom: 1px solid var(--line); }
td{ padding: 12px 16px; font-size: 13.5px; border-bottom: 1px solid var(--line); }
tr:last-child td{ border-bottom:none; }
.badge{ display:inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.badge.fix{ background: rgba(58,110,165,0.12); color: var(--sky-deep); }
.badge.var{ background: rgba(217,164,65,0.18); color: var(--mustard-deep); }
.badge.jour{ background: rgba(76,139,92,0.12); color: var(--green); }
.badge.nuit{ background: rgba(30,58,90,0.10); color: var(--sky-ink); }

.placeholder-view{
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding: 80px 20px; text-align:center; color: var(--ink-soft);
}
.placeholder-view svg{ width:44px; height:44px; opacity:.35; margin-bottom:14px; }
.placeholder-view h3{ font-size: 16px; color: var(--ink); margin-bottom: 6px; }
.placeholder-view p{ font-size: 13px; max-width: 320px; }

@media (max-width: 900px){
  .stat-grid{ grid-template-columns: repeat(2,1fr); }
  .sidebar{ width: 72px; }
  .sidebar-brand h2, .nav-item span, .user-chip-text, .logout-btn span{ display:none; }
  .nav-item{ justify-content:center; }
}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l2-2 4 4 8-8 2 2"/><path d="M3 18l2-2 4 4 8-8 2 2"/></svg>
      </div>
      <h1>OPS HQ</h1>
      <p>Système Central de Gestion RH</p>
    </div>

    <div class="profile-grid" id="profileGrid"></div>

    <input type="password" id="passwordInput" class="login-input" placeholder="Mot de passe d'accès...">
    <button id="loginBtn" class="login-submit" disabled>DÉVERROUILLER</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <div class="shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="mark">O</div>
        <h2>OPS HQ</h2>
      </div>

      <div class="nav-group">
        <div class="nav-label">Opérations</div>
        <button class="nav-item" data-view="dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg><span>Dashboard</span></button>
        <button class="nav-item" data-view="planning"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 3v3M16 3v3"/></svg><span>Planning</span></button>
        <button class="nav-item" data-view="pointage"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg><span>Pointage</span></button>
        <button class="nav-item" data-view="absences"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19h16M4 19V7a2 2 0 012-2h4l2 2h6a2 2 0 012 2v10"/></svg><span>Absences</span></button>
      </div>

      <div class="nav-group">
        <div class="nav-label">Ressources</div>
        <button class="nav-item" data-view="agents"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3.5"/><path d="M2 21c0-4 3-6.5 7-6.5S16 17 16 21"/><circle cx="18" cy="9" r="2.5"/><path d="M22 21c0-3-1.8-5-4.5-5.3"/></svg><span>Agents</span></button>
        <button class="nav-item" data-view="paie"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="13" rx="2"/><circle cx="12" cy="12.5" r="3"/><path d="M6 6V5a2 2 0 012-2h8a2 2 0 012 2v1"/></svg><span>Paie</span></button>
        <button class="nav-item" data-view="rapports"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h6M9 9h1"/></svg><span>Rapports</span></button>
      </div>

      <div class="nav-group">
        <div class="nav-label">Système</div>
        <button class="nav-item" data-view="parametres"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09c0 .68.39 1.29 1 1.51.35.14.74.18 1.11.09"/></svg><span>Paramètres</span></button>
      </div>

      <div class="sidebar-footer">
        <div class="user-chip">
          <div class="dot"></div>
          <div class="user-chip-text">
            <b id="sidebarUserName">—</b>
            <span id="sidebarUserRole">—</span>
          </div>
        </div>
        <button class="logout-btn" id="logoutBtn"><span>Déconnexion</span></button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <h1 id="viewTitle">Dashboard</h1>
        <div class="topbar-meta">
          <div class="sync-pill"><span class="dot"></span>Cloud Sync Active</div>
          <span id="clock">--:--</span>
        </div>
      </div>

      <!-- DASHBOARD -->
      <section class="view" id="view-dashboard">
        <div class="stat-grid">
          <div class="stat-card">
            <div class="label">Agents actifs</div>
            <div class="value" id="statActive">—</div>
            <div class="sub">sur 12 au total</div>
          </div>
          <div class="stat-card">
            <div class="label">En shift JOUR</div>
            <div class="value" id="statJour">—</div>
            <div class="sub">équipe matin</div>
          </div>
          <div class="stat-card">
            <div class="label">En shift NUIT</div>
            <div class="value" id="statNuit">—</div>
            <div class="sub">équipe soir</div>
          </div>
          <div class="stat-card">
            <div class="label">Zones couvertes</div>
            <div class="value" id="statZones">—</div>
            <div class="sub">sur 5 zones</div>
          </div>
        </div>

        <div class="section-title">Zones</div>
        <div class="zone-grid" id="zoneGrid"></div>
      </section>

      <!-- AGENTS -->
      <section class="view hidden" id="view-agents">
        <div class="card">
          <table>
            <thead><tr><th>Agent</th><th>Zone</th><th>Type</th><th>Shift fixe</th></tr></thead>
            <tbody id="agentsTableBody"></tbody>
          </table>
        </div>
      </section>

      <!-- PLACEHOLDERS -->
      <section class="view hidden" id="view-planning"></section>
      <section class="view hidden" id="view-pointage"></section>
      <section class="view hidden" id="view-absences"></section>
      <section class="view hidden" id="view-paie"></section>
      <section class="view hidden" id="view-rapports"></section>
      <section class="view hidden" id="view-parametres"></section>
    </main>
  </div>
</div>

<script>
/* ================= FIREBASE INIT ================= */
const firebaseConfig = {
  apiKey: "AIzaSyAg7ayUgGUc1ZUn0_Zg9BqNDMmDnjSIBLw",
  authDomain: "ops-hq-v2-848f6.firebaseapp.com",
  projectId: "ops-hq-v2-848f6",
  storageBucket: "ops-hq-v2-848f6.firebasestorage.app",
  messagingSenderId: "939361423052",
  appId: "1:939361423052:web:88435f237b1542ae0f3c69"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ================= AGENTS DATA ================= */
// shiftType: "FIX" (never alternates) or "VAR" (alternates JOUR/NUIT weekly by weekIdx parity)
// fixedPeriod only applies when shiftType === "FIX"
const AGENTS = [
  { id: "achraf",   name: "Achraf Akhlij",     zone: "Agdal-Soussi",       shiftType: "VAR", fixedPeriod: null },
  { id: "youssef",  name: "Youssef Derkaoui",  zone: "Hay Riad",           shiftType: "VAR", fixedPeriod: null },
  { id: "aymane",   name: "Aymane Chlifane",   zone: "Carrousel-Hay Fath", shiftType: "VAR", fixedPeriod: null },
  { id: "ayoub_a",  name: "Ayoub Abssi",       zone: "Hay Riad",           shiftType: "FIX", fixedPeriod: "JOUR" },
  { id: "mourad",   name: "Mourad Cherradi",   zone: "Agdal-Soussi",       shiftType: "FIX", fixedPeriod: "NUIT" },
  { id: "yahya",    name: "Yahya Rhallab",     zone: "Carrousel-Hay Fath", shiftType: "VAR", fixedPeriod: null },
  { id: "hassan",   name: "Hassan Azgoune",    zone: "Salé-Medina",        shiftType: "VAR", fixedPeriod: null },
  { id: "ayoub_b",  name: "Ayoub Ben Malek",   zone: "Salé-Medina",        shiftType: "VAR", fixedPeriod: null },
  { id: "charaf",   name: "Charaf Loummihi",   zone: "Salé-Medina",        shiftType: "VAR", fixedPeriod: null },
  { id: "zakariae", name: "Zakariae Benali",   zone: "Salé-Medina",        shiftType: "VAR", fixedPeriod: null },
  { id: "islam",    name: "Islam Elmardi",     zone: "Temara",             shiftType: "FIX", fixedPeriod: "NUIT" },
  { id: "oussama",  name: "Oussama El Atrach", zone: "Temara",             shiftType: "FIX", fixedPeriod: "JOUR" },
];
const ZONES = ["Hay Riad", "Agdal-Soussi", "Carrousel-Hay Fath", "Temara", "Salé-Medina"];

// Login profiles shown on the lock screen (admin + leads)
const PROFILES = [
  { id: "najib", name: "Najib", role: "Lead", initials: "NH", color: "#3A6EA5", authType: "firebase" },
  { id: "oussama_h", name: "Oussama", role: "Manager", initials: "OE", color: "#26241D", authType: "firebase" },
];

/* ================= LOGIN ================= */
let selectedProfile = null;

function renderProfiles(){
  const grid = document.getElementById('profileGrid');
  grid.innerHTML = '';
  PROFILES.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'profile-btn';
    btn.innerHTML = `<div class="profile-avatar" style="background:${p.color}">${p.initials}</div><span>${p.name}</span><small>${p.role}</small>`;
    btn.addEventListener('click', () => selectProfile(p, btn));
    grid.appendChild(btn);
  });
}

function selectProfile(profile, btnEl){
  selectedProfile = profile;
  document.querySelectorAll('.profile-btn').forEach(b => b.classList.remove('selected'));
  btnEl.classList.add('selected');
  document.getElementById('loginBtn').disabled = false;
  document.getElementById('loginError').textContent = '';
}

document.getElementById('loginBtn').addEventListener('click', attemptLogin);
document.getElementById('passwordInput').addEventListener('keydown', e => { if(e.key === 'Enter') attemptLogin(); });

function attemptLogin(){
  const pass = document.getElementById('passwordInput').value.trim();
  const errEl = document.getElementById('loginError');
  if(!selectedProfile){ errEl.textContent = 'Sélectionnez un profil.'; return; }
  if(!pass){ errEl.textContent = 'Entrez le mot de passe.'; return; }

  errEl.textContent = 'Connexion...';
  // Admin/manager profiles use Firebase Auth (email/password).
  // Convention: profile.id + "@opshq.local" as the auth email.
  const email = `${selectedProfile.id}@opshq.local`;
  auth.signInWithEmailAndPassword(email, pass)
    .then(() => {
      errEl.textContent = '';
      enterApp(selectedProfile);
    })
    .catch(err => {
      errEl.textContent = "Mot de passe incorrect ou compte non configuré.";
      console.error(err);
    });
}

function enterApp(profile){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('sidebarUserName').textContent = profile.name;
  document.getElementById('sidebarUserRole').textContent = profile.role;
  initDashboard();
}

document.getElementById('logoutBtn').addEventListener('click', () => {
  auth.signOut().finally(() => location.reload());
});

/* ================= NAVIGATION ================= */
document.querySelectorAll('.nav-item[data-view]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const view = btn.dataset.view;
    document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
    const target = document.getElementById('view-' + view);
    target.classList.remove('hidden');
    document.getElementById('viewTitle').textContent = btn.querySelector('span').textContent;
    if(['planning','pointage','absences','paie','rapports','parametres'].includes(view) && !target.dataset.built){
      renderPlaceholder(target, btn.querySelector('span').textContent);
      target.dataset.built = '1';
    }
  });
});
document.querySelector('.nav-item[data-view="dashboard"]').classList.add('active');

function renderPlaceholder(el, label){
  el.innerHTML = `
    <div class="placeholder-view">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
      <h3>${label} — module en construction</h3>
      <p>C'est la fondation. On construit ce module dans la prochaine étape.</p>
    </div>`;
}

/* ================= CLOCK ================= */
function tickClock(){
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}
setInterval(tickClock, 1000);
tickClock();

/* ================= WEEK INDEX (for JOUR/NUIT alternance) ================= */
function getWeekIndex(date = new Date()){
  const firstJan = new Date(date.getFullYear(), 0, 1);
  const days = Math.floor((date - firstJan) / 86400000);
  return Math.ceil((days + firstJan.getDay() + 1) / 7);
}

function getAgentPeriod(agent, weekIdx){
  if(agent.shiftType === 'FIX') return agent.fixedPeriod;
  // VAR agents alternate by week parity
  return (weekIdx % 2 === 0) ? 'JOUR' : 'NUIT';
}

/* ================= DASHBOARD ================= */
function initDashboard(){
  const weekIdx = getWeekIndex();
  let jourCount = 0, nuitCount = 0;
  AGENTS.forEach(a => {
    const period = getAgentPeriod(a, weekIdx);
    if(period === 'JOUR') jourCount++; else nuitCount++;
  });
  document.getElementById('statActive').textContent = AGENTS.length;
  document.getElementById('statJour').textContent = jourCount;
  document.getElementById('statNuit').textContent = nuitCount;
  document.getElementById('statZones').textContent = ZONES.length;

  const zoneGrid = document.getElementById('zoneGrid');
  zoneGrid.innerHTML = '';
  ZONES.forEach(zone => {
    const count = AGENTS.filter(a => a.zone === zone).length;
    const card = document.createElement('div');
    card.className = 'zone-card';
    card.innerHTML = `<h3>${zone}</h3><div class="count">${count}</div><div class="count-label">agent${count>1?'s':''} assigné${count>1?'s':''}</div>`;
    zoneGrid.appendChild(card);
  });

  renderAgentsTable(weekIdx);
}

function renderAgentsTable(weekIdx){
  const tbody = document.getElementById('agentsTableBody');
  tbody.innerHTML = '';
  AGENTS.forEach(a => {
    const period = getAgentPeriod(a, weekIdx);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><b>${a.name}</b></td>
      <td>${a.zone}</td>
      <td><span class="badge ${a.shiftType === 'FIX' ? 'fix' : 'var'}">${a.shiftType === 'FIX' ? 'Fixe' : 'Alternant'}</span></td>
      <td><span class="badge ${period === 'JOUR' ? 'jour' : 'nuit'}">${period}</span></td>
    `;
    tbody.appendChild(tr);
  });
}

/* ================= AUTH STATE (persist session on refresh) ================= */
auth.onAuthStateChanged(user => {
  if(user){
    const uid = user.email.split('@')[0];
    const profile = PROFILES.find(p => p.id === uid);
    if(profile) enterApp(profile);
  }
});

renderProfiles();
