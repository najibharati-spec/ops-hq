<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OPS HQ — Premium Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
/* =============================================
   DYNAMIC PRO DESIGN — LUXURY DARK & GOLD THEME
   ============================================= */
:root{
  --bg: #06080c;
  --bg2: #0b0f17;
  --bg3: #111622;
  --border: #1e293b;
  
  /* Typography Colors */
  --t1: #f8f6f0;
  --t2: #dcd7ca;
  --t3: #a3957a;
  --t4: #635843;
  
  /* Brand Accent: Premium Gold */
  --acc: #d4af37;
  --acc2: #f3e5ab;
  --accbg: rgba(212, 175, 55, 0.08);
  --accbdr: rgba(212, 175, 55, 0.25);
  
  /* Functional Colors with Smooth Glow */
  --green: #10b981;
  --gbg: rgba(16, 185, 129, 0.1);
  --gbdr: rgba(16, 185, 129, 0.25);
  
  --amber: #f59e0b;
  --abg: rgba(245, 158, 11, 0.1);
  --abdr: rgba(245, 158, 11, 0.25);
  
  --red: #ef4444;
  --rbg: rgba(239, 68, 68, 0.1);
  --rbdr: rgba(239, 68, 68, 0.25);
  
  --purple: #8b5cf6;
  --pbg: rgba(139, 92, 246, 0.1);
  --pbdr: rgba(139, 92, 246, 0.25);
  
  --slate: #64748b;
  --sbg: rgba(100, 116, 139, 0.1);
  --sbdr: rgba(100, 116, 139, 0.25);

  --shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
  --shadow-md: 0 12px 40px rgba(0, 0, 0, 0.8);
  --r: 10px; 
  --rl: 16px;
  
  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'Plus Jakarta Sans', sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;color:inherit}
body{
  font-family:var(--font-body);
  background:var(--bg) !important;
  color:var(--t1) !important;
  font-size:14px;
  line-height:1.5;
  background-image: 
    radial-gradient(circle at 10% 10%, rgba(212, 175, 55, 0.04) 0%, transparent 40%),
    radial-gradient(circle at 90% 90%, rgba(139, 92, 246, 0.02) 0%, transparent 40%) !important;
}

.page{display:none;min-height:100vh}.page.active{display:flex}

/* LOGIN DESIGN */
.login-page{
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg, #030508 0%, #0b0f17 100%) !important;
  position:relative;
  overflow:hidden;
}
.login-page::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 50%, rgba(212,175,55,0.06) 0%, transparent 60%);
  pointer-events:none;
}
.tracking-line{position:absolute;top:0;left:0;width:100%;height:3px;background:rgba(255,255,255,0.05);overflow:hidden}
.tracking-line::after{
  content:'';position:absolute;top:0;left:-20%;width:20%;height:100%;
  background:linear-gradient(90deg,transparent,var(--acc),var(--acc2),transparent);
  animation:trackmove 3s linear infinite;
}
@keyframes trackmove{from{left:-20%}to{left:100%}}

.login-card{
  background:linear-gradient(145deg, #0b0f17, #111622) !important;
  border:1px solid var(--accbdr) !important;
  border-radius:24px !important;
  padding:48px 40px;
  width:100%;
  max-width:440px;
  box-shadow:var(--shadow-md);
  z-index:1;
}
.logo-text{
  display:block;
  font-family:var(--font-display);
  font-size:32px;
  font-weight:700;
  letter-spacing:4px;
  text-align:center;
  background: linear-gradient(135deg, var(--acc), var(--acc2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.logo-sub{display:block;font-size:11px;color:var(--t4);letter-spacing:2px;text-align:center;margin-top:6px;margin-bottom:36px;text-transform:uppercase;font-weight:700}

.field{margin-bottom:20px}.field label{display:block;font-size:11px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;font-weight:600}
.inp-wrap{position:relative;display:flex;align-items:center}
.inp-wrap i:first-child{position:absolute;left:14px;color:var(--t4);font-size:16px}
.inp-wrap input{
  width:100%;
  background:var(--bg3) !important;
  border:1.5px solid var(--border) !important;
  border-radius:var(--r) !important;
  padding:12px 40px 12px 42px;
  color:var(--t1) !important;
  font-size:14px;
  outline:none;
  transition:all .2s;
}
.inp-wrap input:focus{border-color:var(--acc) !important;box-shadow: 0 0 0 3px rgba(212,175,55,0.15) !important}
.eye{position:absolute;right:14px;color:var(--t4);cursor:pointer}

.btn-login{
  width:100%;
  background:linear-gradient(135deg, var(--acc), #b89228) !important;
  border:none !important;
  color:var(--bg) !important;
  border-radius:var(--r) !important;
  padding:14px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-top:12px;
  transition:all 0.2s;
  font-family:var(--font-display);
  box-shadow: 0 4px 15px rgba(212,175,55,0.25) !important;
}
.btn-login:hover{transform: translateY(-1px); filter: brightness(1.1); box-shadow: 0 6px 20px rgba(212,175,55,0.4) !important}

/* SIDEBAR LUXE */
.sidebar{
  width:240px;
  background:linear-gradient(180deg, #070a10, #0b0f17) !important;
  border-right:1px solid var(--border) !important;
  display:flex;flex-direction:column;min-height:100vh;
  position:sticky;top:0;height:100vh;box-shadow:var(--shadow);
}
.sb-logo{padding:28px 24px 20px;border-bottom:1px solid var(--border);position:relative}
.sb-logo::after{content:'';position:absolute;bottom:0;left:0;width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--acc),transparent)}

.nav-sec{padding:20px 24px 6px;font-size:10px;color:var(--t4);letter-spacing:2px;text-transform:uppercase;font-weight:700}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 24px;font-size:13.5px;color:var(--t3);cursor:pointer;transition:all .15s;font-weight:500}
.nav-item:hover{color:var(--t1);background:rgba(255,255,255,0.02)}
.nav-item.active{
  color:var(--acc);
  background:linear-gradient(90deg, var(--accbg), transparent) !important;
  border-left:3px solid var(--acc) !important;
  font-weight:600;
}
.sb-user{margin-top:auto;padding:20px 24px;border-top:1px solid var(--border);background:rgba(0,0,0,0.15)}

/* MAIN CARDS AND MODULES */
.main{flex:1;padding:32px 40px;overflow-y:auto;max-height:100vh}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:32px}
.ptitle{font-family:var(--font-display);font-size:26px;font-weight:700;color:var(--t1);letter-spacing:.5px}
.psub{font-size:12.5px;color:var(--t3);margin-top:4px}

.card, .stat-card, .zone-card, .modal{
  background:linear-gradient(145deg, #0b0f17, #111622) !important;
  border:1px solid var(--border) !important;
  border-radius:var(--rl) !important;
  padding:24px;
  margin-bottom:24px;
  box-shadow:var(--shadow);
}
.card-title{font-size:11px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;font-weight:700;display:flex;align-items:center;justify-content:space-between}

.stat-card::before{
  content:'';position:absolute;top:0;left:0;width:4px;height:100%;
  background:linear-gradient(180deg, var(--acc), transparent) !important;
}
.sval{font-family:var(--font-display);font-size:32px;font-weight:700;color:var(--t1);margin-top:4px}

/* HERO STRIP PREMIUM */
.hero-strip{
  display:flex;align-items:center;gap:32px;
  background:linear-gradient(135deg, #0b0f17 0%, #1c180e 60%, #261f0f 100%) !important;
  border:1px solid rgba(212,175,55,0.2) !important;
  border-radius:20px !important;padding:26px 32px;margin-bottom:28px;box-shadow:var(--shadow-md);
}
.hero-num{font-family:var(--font-display);font-size:42px;font-weight:700;color:var(--acc)}

/* PRO SHIFT CELLS */
.shift-cell{
  border-radius:12px !important;
  padding:8px 12px !important;
  min-width:105px !important;
  min-height:54px !important;
  transition:all 0.2s !important;
}
.shift-cell:hover{
  transform:translateY(-2px) !important;
  box-shadow: 0 6px 15px rgba(0,0,0,0.4) !important;
  filter: brightness(1.15);
}

.sh-work{background:linear-gradient(135deg, rgba(16,185,129,0.15), rgba(16,185,129,0.05)) !important; border:1.5px solid var(--gbdr) !important}
.sh-work .sh-t, .sh-work .sh-s {color:#34d399 !important}

.sh-off{background:linear-gradient(135deg, #151b26, #0f131c) !important; border:1.5px solid rgba(255,255,255,0.08) !important}
.sh-off .sh-t, .sh-off .sh-s {color:var(--slate) !important}

.sh-absent{background:linear-gradient(135deg, rgba(239,68,68,0.15), rgba(239,68,68,0.05)) !important; border:1.5px solid var(--rbdr) !important}
.sh-absent .sh-t, .sh-absent .sh-s {color:#f87171 !important}

.sh-double{background:linear-gradient(135deg, rgba(212,175,55,0.2), rgba(212,175,55,0.05)) !important; border:1.5px solid var(--accbdr) !important}
.sh-double .sh-t, .sh-double .sh-s {color:var(--acc) !important}

/* BADGES & TABLES PRO */
.tbl th, .plan-tbl th{color:var(--t4) !important;font-weight:700 !important;text-transform:uppercase;letter-spacing:1.5px;font-size:11px;padding:12px 14px;border-bottom:2px solid var(--border) !important}
.tbl td, .plan-tbl td{padding:14px;border-bottom:1px solid rgba(255,255,255,0.03) !important;color:var(--t2)}
.tbl tbody tr:hover td{background:rgba(212,175,55,0.02) !important}

.badge{border-radius:6px;font-weight:700;letter-spacing:0.5px;padding:4px 10px;font-size:10.5px}
.badge-blue{background:var(--accbg);color:var(--acc)}
.badge-green{background:var(--gbg);color:var(--green)}
.badge-red{background:var(--rbg);color:var(--red)}

/* INPUTS & FORM ELEMENTS */
input, select, textarea{
  background:var(--bg) !important;
  border:1.5px solid var(--border) !important;
  color:var(--t1) !important;
  border-radius:10px !important;
  padding:10px 14px;
}
input:focus, select:focus, textarea:focus{border-color:var(--acc) !important;box-shadow: 0 0 0 3px rgba(212,175,55,0.1) !important;outline:none}

/* MODAL BLUR BACKGROUND */
.modal-ov{backdrop-filter:blur(10px) !important;background:rgba(3,5,8,0.7) !important}

/* SCROLLBAR PRO */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--acc)}

/* BUTTONS MODERN PRO */
.btn{
  background:linear-gradient(145deg, #111622, #0b0f17) !important;
  border:1px solid var(--border) !important;
  color:var(--t2) !important;
  padding:10px 18px;border-radius:10px !important;font-weight:600;transition:all 0.2s;
}
.btn:hover{border-color:var(--acc) !important;color:var(--t1) !important}
.btn-primary{
  background:linear-gradient(135deg, var(--acc), #b89228) !important;
  color:var(--bg) !important;font-weight:700 !important;border:none !important;
}
.btn-primary:hover{filter:brightness(1.1)}

</style>
</head>
<body>
